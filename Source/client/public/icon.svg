<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="berry" cx="0.35" cy="0.3">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
    <radialGradient id="berry2" cx="0.35" cy="0.3">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="60%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g>
    <!-- Leaf -->
    <path d="M 256 120 Q 220 100 200 130 Q 180 160 210 180 Q 240 200 260 170 Q 270 150 256 120 Z" fill="#34d399"/>
    <path d="M 256 130 Q 240 145 230 165" stroke="#059669" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Berry 1 (back left) -->
    <circle cx="190" cy="280" r="80" fill="url(#berry2)"/>
    <circle cx="170" cy="255" r="22" fill="#c4b5fd" opacity="0.5"/>
    <!-- Berry 2 (back right) -->
    <circle cx="322" cy="280" r="80" fill="url(#berry2)"/>
    <circle cx="302" cy="255" r="22" fill="#c4b5fd" opacity="0.5"/>
    <!-- Berry 3 (front center, larger) -->
    <circle cx="256" cy="340" r="100" fill="url(#berry)"/>
    <circle cx="232" cy="310" r="28" fill="#ddd6fe" opacity="0.6"/>
    <!-- Crown stars on top of front berry -->
    <g fill="#1e1b4b" opacity="0.6">
      <circle cx="256" cy="248" r="3"/>
      <circle cx="246" cy="253" r="2"/>
      <circle cx="266" cy="253" r="2"/>
      <circle cx="252" cy="245" r="2"/>
      <circle cx="260" cy="245" r="2"/>
    </g>
  </g>
</svg>
